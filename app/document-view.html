<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOVA — Document officiel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../nova-style.css">
<link rel="icon" type="image/png" href="../favicon.png">
<style>
  /* Surcharges spécifiques pour le viewer (réutilise nova-style.css A4) */
  body { background: #e8e4d8; }
  .recu-num {
    position: absolute; top: 22mm; right: 24mm; text-align: right;
    font-size: 10pt; color: var(--muted); line-height: 1.5;
  }
  .recu-num .num-value {
    font-family: 'Cormorant Garamond', serif; font-size: 16pt;
    font-weight: 700; color: var(--navy); letter-spacing: 2px;
  }
  .montant-block {
    text-align: center; margin: 8mm 0; padding: 6mm 8mm;
    background: var(--paper-alt);
    border-top: 2px solid var(--gold); border-bottom: 2px solid var(--gold);
  }
  .montant-block .label {
    font-size: 10pt; color: var(--muted);
    font-variant: small-caps; letter-spacing: 2px;
  }
  .montant-block .montant {
    font-family: 'Cormorant Garamond', serif; font-size: 28pt; font-weight: 700;
    color: var(--navy); margin-top: 2mm; font-variant-numeric: tabular-nums;
  }
  .montant-block .lettres {
    font-style: italic; color: var(--ink-soft); margin-top: 2mm; font-size: 11pt;
  }
  .info-table td {
    padding: 3mm 4mm; border-bottom: 0.5px dotted var(--rule); font-size: 10.5pt;
  }
  .info-table td:first-child {
    color: var(--muted); font-variant: small-caps; letter-spacing: 1px; font-size: 9.5pt; width: 50mm;
  }
  .official-stamp { margin-top: 12mm; text-align: right; }
  .official-stamp .seal {
    display: inline-block; border: 2px solid var(--gold); color: var(--gold);
    padding: 4mm 10mm; font-family: 'Cormorant Garamond', serif;
    font-weight: 700; font-size: 10pt; letter-spacing: 3px;
    transform: rotate(-3deg); text-align: center; line-height: 1.4;
  }
  .loading-state {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', serif; color: var(--navy);
    font-size: 18px; letter-spacing: 3px;
  }
</style>
</head>
<body>

<div class="toolbar no-print" style="display:none;" id="toolbar">
  <button type="button" onclick="NovaExport.toPDF(window.exportFilename || 'NOVA-document')">Télécharger PDF</button>
  <button type="button" class="secondary" onclick="NovaExport.toPNG('.page', window.exportFilename || 'NOVA-document')">Télécharger PNG</button>
  <button type="button" onclick="window.history.length > 1 ? window.history.back() : window.location.href='documents.html'" style="background:transparent;color:#fbf9f3;border:1px solid #b89c5e;">← Retour</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="../nova-export.js"></script>

<div id="container">
  <div class="loading-state" id="loader">Chargement&nbsp;<span style="color:#8b7340;">…</span></div>
</div>

<script type="module">
  import { onAuthChange, getUserProfile } from './js/auth.js';
  import { getDocument, updateDocument, numberToWords, formatDateLong, fmt } from './js/documents.js';
  import { confirmDialog, alertDialog } from './js/ui-dialog.js';

  let myProfile = null;

  const params = new URLSearchParams(window.location.search);
  const docId = params.get('id');
  const container = document.getElementById('container');
  const toolbar = document.getElementById('toolbar');

  function escapeHtml(s) { return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  function renderRecuDon(d) {
    const data = d.data || {};
    const dateDonStr = data.dateDon ? formatDateLong(new Date(data.dateDon)) : '—';
    const montantLettres = numberToWords(data.montant) + ' dollars';
    const numShort = (d.reference || '').replace('NOVA-DON-', '').replace(/-/g, '/');

    window.exportFilename = d.reference || 'NOVA-Recu-Don';

    container.innerHTML = `
      <section class="page">
        <header class="header">
          <div class="title-block">
            <div class="nova">N&thinsp;O&thinsp;V&thinsp;A</div>
            <div class="subtitle">Nouvelle Organisation Vie Associative</div>
          </div>
          <div class="official">
            <strong>État de San Andreas</strong><br>
            Reçu de don associatif<br>
            Document officiel
          </div>
        </header>

        <div class="recu-num">
          Reçu N°<br>
          <span class="num-value">${escapeHtml(d.reference)}</span>
        </div>

        <div class="doc-title">
          <h1>Reçu de Don</h1>
          <div class="ornament">❦ &nbsp; ❦ &nbsp; ❦</div>
          <div class="sub">Délivré au titre d'un don sans contrepartie commerciale<br>conformément à l'Article 8-1.4 du T.T.E.</div>
        </div>

        <p style="text-align:center;margin-top:6mm;">L'Association <strong>NOVA</strong>, déclarée auprès du département de la Vie Civile de l'État de San Andreas,<br>certifie avoir reçu le don suivant :</p>

        <table class="info-table" style="width:100%;border-collapse:collapse;margin-top:6mm;">
          <tr><td>Donateur</td><td><strong>${escapeHtml(data.donateur || '—')}</strong></td></tr>
          <tr><td>Qualité / Statut</td><td>${escapeHtml(data.qualite || '—')}</td></tr>
          <tr><td>Adresse</td><td>${escapeHtml(data.adresse || '—')}</td></tr>
          <tr><td>Date du don</td><td>${dateDonStr}</td></tr>
          <tr><td>Nature du don</td><td>${data.nature === 'nature' ? 'Don en nature' : 'Don numéraire'}</td></tr>
        </table>

        <div class="montant-block">
          <div class="label">Montant du don</div>
          <div class="montant">${fmt(data.montant)}</div>
          <div class="lettres">${montantLettres}</div>
        </div>

        ${data.description ? `<table class="info-table" style="width:100%;border-collapse:collapse;">
          <tr><td>Description détaillée</td><td>${escapeHtml(data.description)}</td></tr>
          <tr><td>Affectation</td><td>Réalisation de l'objet social de l'Association NOVA, conformément à ses Statuts.</td></tr>
        </table>` : ''}

        <div class="alert" style="margin-top:6mm;">
          <strong>Mentions légales :</strong> Le présent reçu atteste que le don décrit ci-dessus a été effectué <strong>sans contrepartie commerciale</strong> et qu'il relève à ce titre du régime des dons défini par l'<span class="tte-ref">Article 8-1.4 du T.T.E.</span>, hors plafond hebdomadaire de chiffre généré.
        </div>

        <div class="official-stamp">
          <div class="seal">ASSOCIATION<br>NOVA<br>RÉF. ${escapeHtml(numShort)}</div>
        </div>

        <table class="signatures" style="margin-top:6mm;width:100%;border-collapse:collapse;">
          <tr><th style="width:35%">Pour l'Association</th><th style="width:35%">Nom</th><th>Signature</th></tr>
          <tr><td><strong>Trésorier</strong></td><td>Jeff TAYLOR</td><td class="signature-line"></td></tr>
          <tr><td><strong>Président</strong></td><td>Andrew BEAUCHAMP</td><td class="signature-line"></td></tr>
        </table>

        <p style="text-align:center;margin-top:6mm;font-size:9.5pt;color:var(--muted);font-style:italic;">
          Reçu créé le ${formatDateLong(d.createdAt)} par ${escapeHtml(d.createdByName || '—')}.<br>
          Document archivé dans la base NOVA — référence ${escapeHtml(d.reference)}.
        </p>

        <footer class="footer">
          <span>NOVA — Reçu de don</span>
          <span>Page 1 / 1</span>
        </footer>
      </section>
    `;
  }

  // ===== FACTURE =====
  function renderFacture(d) {
    const data = d.data || {};
    const dateEm = data.dateEmission ? formatDateLong(new Date(data.dateEmission)) : '—';
    const echeance = data.echeance ? formatDateLong(new Date(data.echeance)) : '—';
    window.exportFilename = d.reference || 'NOVA-Facture';
    const lignesHtml = (data.lignes || []).map(l => `
      <tr>
        <td>${escapeHtml(l.designation)}</td>
        <td style="text-align:center;">${l.qte}</td>
        <td style="text-align:right;">${fmt(l.pu)}</td>
        <td style="text-align:right;font-weight:600;">${fmt(l.total)}</td>
      </tr>
    `).join('');

    container.innerHTML = `
      <section class="page">
        <header class="header">
          <div class="title-block">
            <div class="nova">N&thinsp;O&thinsp;V&thinsp;A</div>
            <div class="subtitle">Nouvelle Organisation Vie Associative</div>
          </div>
          <div class="official"><strong>État de San Andreas</strong><br>Facture officielle</div>
        </header>
        <div class="recu-num">
          Facture N°<br><span class="num-value">${escapeHtml(d.reference)}</span>
        </div>
        <div class="doc-title">
          <h1>Facture</h1>
          <div class="ornament">❦ &nbsp; ❦ &nbsp; ❦</div>
          <div class="sub">Prestation de partenariat — Imposable au titre de l'Article 4-2.2 du T.T.E.</div>
        </div>

        <table class="info-table" style="width:100%;border-collapse:collapse;margin-top:6mm;">
          <tr><td>Émetteur</td><td><strong>Association NOVA</strong> — Représentée par Andrew BEAUCHAMP, Président</td></tr>
          <tr><td>Client</td><td><strong>${escapeHtml(data.client || '—')}</strong></td></tr>
          <tr><td>Représentant client</td><td>${escapeHtml(data.representant || '—')}</td></tr>
          <tr><td>Adresse client</td><td>${escapeHtml(data.adresse || '—')}</td></tr>
          ${data.conventionRef ? `<tr><td>Référence convention</td><td>${escapeHtml(data.conventionRef)}</td></tr>` : ''}
          <tr><td>Date d'émission</td><td>${dateEm}</td></tr>
        </table>

        <h3 class="article" style="margin-top:8mm;"><span class="num">Détail.</span> Prestations facturées</h3>
        <table style="width:100%;border-collapse:collapse;margin-top:3mm;font-size:11pt;">
          <thead>
            <tr style="background:var(--navy);color:var(--paper);">
              <th style="padding:3mm 4mm;text-align:left;">Désignation</th>
              <th style="padding:3mm 4mm;text-align:center;width:18mm;">Qté</th>
              <th style="padding:3mm 4mm;text-align:right;width:28mm;">P.U.</th>
              <th style="padding:3mm 4mm;text-align:right;width:30mm;">Total</th>
            </tr>
          </thead>
          <tbody>
            ${lignesHtml || '<tr><td colspan="4" style="padding:5mm;text-align:center;color:var(--muted);">Aucune ligne</td></tr>'}
            <tr style="background:var(--paper-alt);border-top:2px solid var(--gold);font-weight:700;">
              <td colspan="3" style="padding:3.5mm 4mm;text-align:right;">TOTAL DÛ</td>
              <td style="padding:3.5mm 4mm;text-align:right;color:var(--navy);">${fmt(data.total)}</td>
            </tr>
          </tbody>
        </table>

        <div class="alert" style="margin-top:6mm;">
          <strong>Conditions de paiement :</strong> Échéance : ${echeance}. Modalité : virement bancaire au compte de l'Association NOVA.
        </div>

        <div class="signature-block">
          <div style="font-style: italic; color: var(--muted); margin-bottom: 12mm;">Pour l'Association NOVA, émettrice :</div>
          <div class="nom">Jeff TAYLOR</div>
          <div class="fonction">Trésorier — Association NOVA</div>
        </div>

        <p style="text-align:center;margin-top:6mm;font-size:9.5pt;color:var(--muted);font-style:italic;">
          Facture créée le ${formatDateLong(d.createdAt)} par ${escapeHtml(d.createdByName || '—')}.<br>
          Document archivé — référence ${escapeHtml(d.reference)}.
        </p>

        <footer class="footer"><span>NOVA — Facture</span><span>Page 1 / 1</span></footer>
      </section>
    `;
  }

  // ===== CONVENTION =====
  function renderConvention(d) {
    const data = d.data || {};
    const dateConv = data.dateConv ? formatDateLong(new Date(data.dateConv)) : '—';
    window.exportFilename = d.reference || 'NOVA-Convention';
    const TYPES_LBL = { recompenses: 'Récompenses', questions: 'Questions', experiences: 'Expériences', visuel: 'Visuel' };
    const typesHtml = (data.types || []).map(t => `<li>${TYPES_LBL[t] || t}</li>`).join('');

    container.innerHTML = `
      <section class="page">
        <header class="header">
          <div class="title-block">
            <div class="nova">N&thinsp;O&thinsp;V&thinsp;A</div>
            <div class="subtitle">Nouvelle Organisation Vie Associative</div>
          </div>
          <div class="official"><strong>État de San Andreas</strong><br>Convention de partenariat</div>
        </header>
        <div class="recu-num">
          Convention N°<br><span class="num-value">${escapeHtml(d.reference)}</span>
        </div>
        <div class="doc-title">
          <h1>Convention de Partenariat</h1>
          <div class="ornament">❦ &nbsp; ❦ &nbsp; ❦</div>
          <div class="sub">Encadrement formel de l'apport partenaire à un événement de l'Association NOVA</div>
        </div>

        <h3 class="article"><span class="num">Article 1.</span> Identification des parties</h3>
        <table class="info-table" style="width:100%;border-collapse:collapse;margin-top:3mm;">
          <tr><td>L'Association</td><td><strong>NOVA</strong> — Représentée par Andrew BEAUCHAMP, Président</td></tr>
          <tr><td>Le Partenaire</td><td><strong>${escapeHtml(data.partenaire || '—')}</strong></td></tr>
          <tr><td>Secteur</td><td>${escapeHtml(data.secteur || '—')}</td></tr>
          <tr><td>Représentant</td><td>${escapeHtml(data.representant || '—')}</td></tr>
          <tr><td>Email contact</td><td>${escapeHtml(data.email || '—')}</td></tr>
          <tr><td>Adresse</td><td>${escapeHtml(data.adresse || '—')}</td></tr>
        </table>

        <h3 class="article" style="margin-top:6mm;"><span class="num">Article 2.</span> Type(s) de partenariat</h3>
        <ul style="margin-top:2mm;">${typesHtml}</ul>

        <h3 class="article"><span class="num">Article 3.</span> Contribution du Partenaire</h3>
        <blockquote>${escapeHtml(data.contribution || '—').replace(/\n/g,'<br>')}</blockquote>
        <p><strong>Valeur estimée :</strong> ${fmt(data.valeur)}</p>
        <p><strong>Date de signature :</strong> ${dateConv}</p>

        <h3 class="article" style="margin-top:6mm;"><span class="num">Article 4.</span> Engagements de l'Association</h3>
        <p>L'Association NOVA s'engage à mentionner le Partenaire dans toute communication officielle relative à l'événement, à fournir un bilan de visibilité post-événement sur demande, et à respecter l'image du Partenaire en toutes circonstances.</p>

        <p style="font-size:9.5pt;color:var(--muted);font-style:italic;text-align:justify;margin-top:6mm;">Convention enregistrée dans la base NOVA — réf. ${escapeHtml(d.reference)} — créée le ${formatDateLong(d.createdAt)} par ${escapeHtml(d.createdByName || '—')}.</p>

        <table class="signatures" style="margin-top:8mm;width:100%;border-collapse:collapse;">
          <tr><th style="width:35%">Partie</th><th style="width:30%">Nom et qualité</th><th>Signature</th></tr>
          <tr><td><strong>Pour l'Association NOVA</strong></td><td>Andrew BEAUCHAMP, Président</td><td class="signature-line"></td></tr>
          <tr><td><strong>Pour le Partenaire</strong></td><td>${escapeHtml(data.representant || '—')}</td><td class="signature-line"></td></tr>
        </table>

        <footer class="footer"><span>NOVA — Convention de partenariat</span><span>Page 1 / 1</span></footer>
      </section>
    `;
  }

  // ===== CONTRAT D'ENGAGEMENT BÉNÉVOLE =====
  function renderContratEngagement(d) {
    const data = d.data || {};
    const dateDebut = data.dateDebut ? formatDateLong(new Date(data.dateDebut)) : '—';
    const dateFin = data.dateFin ? formatDateLong(new Date(data.dateFin)) : '—';
    window.exportFilename = d.reference || 'NOVA-Contrat-Engagement';

    container.innerHTML = `
      <section class="page">
        <header class="header">
          <div class="title-block">
            <div class="nova">N&thinsp;O&thinsp;V&thinsp;A</div>
            <div class="subtitle">Nouvelle Organisation Vie Associative</div>
          </div>
          <div class="official"><strong>État de San Andreas</strong><br>Contrat d'engagement associatif<br>Conforme à l'Article 8-1.5 du T.T.E.</div>
        </header>
        <div class="recu-num">
          Contrat N°<br><span class="num-value">${escapeHtml(d.reference)}</span>
        </div>
        <div class="doc-title">
          <h1>Contrat d'Engagement Associatif</h1>
          <div class="ornament">❦ &nbsp; ❦ &nbsp; ❦</div>
          <div class="sub">Engagement bénévole gratuit — Article 8-1.5 du T.T.E.</div>
        </div>

        <h3 class="article"><span class="num">Article 1.</span> Identification des parties</h3>
        <table class="info-table" style="width:100%;border-collapse:collapse;">
          <tr><td>L'Association</td><td><strong>NOVA</strong> — Représentée par Andrew BEAUCHAMP, Président</td></tr>
          <tr><td>Le bénévole</td><td><strong>${escapeHtml(data.nom || '—')}</strong></td></tr>
          <tr><td>Identité in-game</td><td>${escapeHtml(data.inGameName || '—')}</td></tr>
          <tr><td>Adresse / Contact</td><td>${escapeHtml(data.adresse || '—')}</td></tr>
        </table>

        <h3 class="article"><span class="num">Article 2.</span> Mission confiée</h3>
        <blockquote>${escapeHtml(data.mission || '—').replace(/\n/g,'<br>')}</blockquote>

        <h3 class="article"><span class="num">Article 3.</span> Durée et lieu</h3>
        <ul>
          <li><strong>Date de début :</strong> ${dateDebut}</li>
          <li><strong>Date de fin :</strong> ${dateFin}</li>
          <li><strong>Lieu(x) d'exécution :</strong> ${escapeHtml(data.lieu || '—')}</li>
        </ul>

        <h3 class="article"><span class="num">Article 4.</span> Gratuité de l'engagement</h3>
        <p>Conformément à l'<span class="tte-ref">Article 8-1.1 du T.T.E.</span>, l'engagement est <strong>strictement gratuit</strong>. Aucune rémunération ne sera versée au titre du présent engagement.</p>

        <h3 class="article"><span class="num">Article 5.</span> Défraiement éventuel</h3>
        <blockquote>${escapeHtml(data.defraiement || 'Aucun.').replace(/\n/g,'<br>')}</blockquote>

        <h3 class="article"><span class="num">Article 6.</span> Confidentialité</h3>
        <p>Le bénévole s'engage à ne divulguer à aucun tiers les informations sensibles auxquelles il pourrait accéder dans le cadre de sa mission. Cette obligation perdure pendant un (1) an après la fin de l'engagement.</p>

        <p style="font-size:9.5pt;color:var(--muted);font-style:italic;text-align:justify;margin-top:6mm;">Contrat enregistré — réf. ${escapeHtml(d.reference)} — créé le ${formatDateLong(d.createdAt)} par ${escapeHtml(d.createdByName || '—')}.</p>

        <table class="signatures" style="margin-top:8mm;width:100%;border-collapse:collapse;">
          <tr><th style="width:35%">Partie</th><th style="width:30%">Nom</th><th>Signature</th></tr>
          <tr><td><strong>Pour l'Association NOVA</strong></td><td>Andrew BEAUCHAMP, Président</td><td class="signature-line"></td></tr>
          <tr><td><strong>Le bénévole</strong></td><td>${escapeHtml(data.nom || '—')}</td><td class="signature-line"></td></tr>
        </table>

        <footer class="footer"><span>NOVA — Contrat d'engagement associatif</span><span>Page 1 / 1</span></footer>
      </section>
    `;
  }

  const CATEGORIE_BREVET_LABELS = {
    emission:     'Émission / format télévisuel',
    format:       'Format de compétition',
    denomination: 'Dénomination / marque',
    oeuvre:       'Œuvre originale',
    autre:        'Autre'
  };

  function renderBrevet(d) {
    const data = d.data || {};
    const dateDepot = data.dateDepot ? formatDateLong(new Date(data.dateDepot)) : '—';
    const dateValidation = data.dateValidation ? formatDateLong(new Date(data.dateValidation)) : null;
    const isValide = data.statutValidation === 'valide';
    const elementsList = (data.elements || []).map(e => `<li>${escapeHtml(e)}</li>`).join('') || '<li>—</li>';
    const categorieLbl = CATEGORIE_BREVET_LABELS[data.categorie] || data.categorie || '—';
    window.exportFilename = d.reference || 'NOVA-Brevet';

    const banniereStatut = isValide
      ? `<div style="background:#e3ebdc;border-left:3px solid #4a6b3a;padding:4mm 6mm;margin:6mm 0;font-size:10.5pt;color:#3a4f30;"><strong>✓ Brevet validé</strong> par ${escapeHtml(data.validePar || '—')} le ${dateValidation || '—'}.</div>`
      : `<div style="background:#f5e9d3;border-left:3px solid #a06b1f;padding:4mm 6mm;margin:6mm 0;font-size:10.5pt;color:#7a5418;"><strong>⌛ En attente de validation</strong> — ce dépôt doit être validé par le Président de NOVA pour être opposable aux tiers.</div>`;

    const peutValider = myProfile && myProfile.role === 'president' && !isValide;
    const boutonValider = peutValider
      ? `<div class="no-print" style="text-align:center;margin:4mm 0;"><button id="btn-valider-brevet" style="background:#1f2d4a;color:#fbf9f3;border:none;padding:10px 24px;font-family:'EB Garamond',serif;font-size:14px;letter-spacing:1.5px;font-variant:small-caps;cursor:pointer;border-radius:3px;">✓ Valider ce brevet (Président)</button></div>`
      : '';

    container.innerHTML = `
      <section class="page">
        <header class="header">
          <div class="title-block">
            <div class="nova">N&thinsp;O&thinsp;V&thinsp;A</div>
            <div class="subtitle">Nouvelle Organisation Vie Associative</div>
          </div>
          <div class="official"><strong>État de San Andreas</strong><br>Brevet de concept<br>Dépôt de propriété intellectuelle</div>
        </header>
        <div class="recu-num">
          Brevet N°<br><span class="num-value">${escapeHtml(d.reference)}</span>
        </div>
        <div class="doc-title">
          <h1>Brevet de Concept</h1>
          <div class="ornament">❦ &nbsp; ❦ &nbsp; ❦</div>
          <div class="sub">Dépôt officiel attestant l'antériorité et la propriété intellectuelle</div>
        </div>

        ${banniereStatut}
        ${boutonValider}

        <h3 class="article"><span class="num">Article 1.</span> Identification du dépôt</h3>
        <table class="info-table" style="width:100%;border-collapse:collapse;">
          <tr><td>Titulaire</td><td><strong>Association NOVA</strong> — Représentée par Andrew BEAUCHAMP, Président</td></tr>
          <tr><td>Auteur(s) / Déposant(s)</td><td><strong>${escapeHtml(data.auteur || '—')}</strong></td></tr>
          <tr><td>Titre du concept</td><td><strong style="color:var(--navy);font-size:12pt;">${escapeHtml(data.titre || '—')}</strong></td></tr>
          <tr><td>Catégorie</td><td>${escapeHtml(categorieLbl)}</td></tr>
          <tr><td>Date de dépôt</td><td>${dateDepot}</td></tr>
        </table>

        <h3 class="article"><span class="num">Article 2.</span> Description du concept</h3>
        <blockquote>${escapeHtml(data.description || '—').replace(/\n/g,'<br>')}</blockquote>

        <h3 class="article"><span class="num">Article 3.</span> Éléments protégés</h3>
        <p>Sont placés sous protection au titre du présent brevet, sans limitation de durée et avec effet rétroactif à la date de dépôt :</p>
        <ul>${elementsList}</ul>

        ${data.clause ? `
        <h3 class="article"><span class="num">Article 4.</span> Clause spécifique</h3>
        <blockquote>${escapeHtml(data.clause).replace(/\n/g,'<br>')}</blockquote>
        ` : ''}

        <h3 class="article"><span class="num">Article ${data.clause ? '5' : '4'}.</span> Portée de la protection</h3>
        <p>Le présent dépôt atteste de l'antériorité du concept à la date du <strong>${dateDepot}</strong> et établit la propriété intellectuelle exclusive de l'Association NOVA sur l'ensemble des éléments énumérés ci-dessus. Toute reproduction, adaptation, exploitation commerciale ou diffusion par un tiers sans autorisation écrite préalable du Président de NOVA constitue une <strong>contrefaçon</strong> et engage la pleine responsabilité civile et pénale du contrevenant.</p>

        <h3 class="article"><span class="num">Article ${data.clause ? '6' : '5'}.</span> Opposabilité</h3>
        <p>Le présent brevet est <strong>opposable aux tiers</strong> dès sa validation par le Président de NOVA. Il constitue, en cas de litige, un titre de propriété attestant de la création originale du concept par l'Association NOVA, antérieurement à toute revendication tierce.</p>

        <p style="font-size:9.5pt;color:var(--muted);font-style:italic;text-align:justify;margin-top:6mm;">Brevet enregistré — réf. ${escapeHtml(d.reference)} — déposé le ${formatDateLong(d.createdAt)} par ${escapeHtml(d.createdByName || '—')}.</p>

        <table class="signatures" style="margin-top:8mm;width:100%;border-collapse:collapse;">
          <tr><th style="width:40%">Autorité</th><th style="width:30%">Nom</th><th>Signature & Date</th></tr>
          <tr>
            <td><strong>Président de NOVA</strong><br><span style="font-size:9pt;color:var(--muted);">Validateur unique du brevet</span></td>
            <td>Andrew BEAUCHAMP</td>
            <td class="signature-line">${isValide ? `<span style="font-family:'Cormorant Garamond',serif;color:var(--gold);font-size:11pt;">Validé le ${dateValidation}</span>` : '<span style="font-style:italic;color:var(--muted);">En attente</span>'}</td>
          </tr>
        </table>

        ${isValide ? `
        <div class="official-stamp">
          <div class="seal">BREVET<br>VALIDÉ<br>NOVA</div>
        </div>
        ` : ''}

        <footer class="footer"><span>NOVA — Brevet de concept (propriété intellectuelle)</span><span>Page 1 / 1</span></footer>
      </section>
    `;

    if (peutValider) {
      document.getElementById('btn-valider-brevet').addEventListener('click', async () => {
        const ok = await confirmDialog(
          `Vous êtes sur le point de valider officiellement ce brevet en tant que Président de NOVA.\n\nCette validation est définitive et rendra le brevet opposable aux tiers.`,
          { title: 'Valider ce brevet ?', confirmLabel: 'Valider' }
        );
        if (!ok) return;
        try {
          const newData = {
            ...data,
            statutValidation: 'valide',
            validePar: myProfile.displayName,
            dateValidation: new Date().toISOString()
          };
          await updateDocument(d.id, { data: newData, status: 'final' });
          const fresh = await getDocument(d.id);
          renderBrevet(fresh);
        } catch (e) {
          await alertDialog(e.message || 'Erreur lors de la validation.', { type: 'error' });
        }
      });
    }
  }

  function renderError(msg) {
    container.innerHTML = `
      <div class="loading-state" style="color:#8b3a3a;flex-direction:column;gap:14px;">
        <div>${escapeHtml(msg)}</div>
        <a href="documents.html" style="color:#8b7340;font-size:13px;text-decoration:underline;letter-spacing:1px;">← Retour aux documents</a>
      </div>
    `;
  }

  onAuthChange(async (user) => {
    if (!user) { window.location.href = 'login.html'; return; }
    if (!docId) { renderError('Aucun document spécifié.'); return; }
    try {
      myProfile = await getUserProfile(user.uid);
      const d = await getDocument(docId);
      if (!d) { renderError('Document introuvable.'); return; }
      const renderers = {
        recu_don: renderRecuDon,
        facture: renderFacture,
        convention: renderConvention,
        contrat_engagement: renderContratEngagement,
        brevet: renderBrevet
      };
      const renderer = renderers[d.type];
      if (renderer) {
        renderer(d);
        toolbar.style.display = 'flex';
      } else {
        renderError(`Type "${d.type}" non encore pris en charge par le viewer.`);
      }
    } catch (e) {
      renderError('Erreur : ' + (e.message || e));
    }
  });
</script>
</body>
</html>
